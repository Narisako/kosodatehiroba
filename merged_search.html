<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>拠点DB統合検索</title>
<style>body{font-family:Meiryo,sans-serif;padding:16px;background:#f7fafc}h1{margin:0 0 10px}.bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}input,select{padding:8px;border:1px solid #ccc;border-radius:6px}.count{color:#666}table{width:100%;border-collapse:collapse;background:#fff}th,td{border-bottom:1px solid #eee;padding:8px;text-align:left;font-size:13px}th{background:#f0f4f8;position:sticky;top:0}.db{white-space:nowrap}.zip{white-space:nowrap}</style></head><body>
<h1>拠点DB統合検索</h1>
<div class="bar">
  <input id="q" type="search" placeholder="拠点名・住所・電話番号で検索" style="min-width:280px;flex:1">
  <select id="db"><option value="">全DB</option><option value="ネット検索">ネット検索</option><option value="全協">全協</option></select>
  <a href="data/csv_by_pref/merged_network_zenkyo_list.csv" download style="display:inline-block;padding:8px 12px;background:#2563eb;color:#fff;border-radius:6px;text-decoration:none;white-space:nowrap;">一括ダウンロード（CSV）</a>
  <span class="count" id="count"></span>
</div>
<table><thead><tr><th>拠点名</th><th>DB名</th><th>郵便番号</th><th>住所</th><th>電話番号</th></tr></thead><tbody id="tb"></tbody></table>
<script>
let DATA=[];
fetch('data/csv_by_pref/merged_network_zenkyo_list.json?v='+Date.now()).then(r=>r.json()).then(d=>{DATA=d;render();});
function fzip(z){z=(z||'').replace(/[^0-9]/g,''); return z.length===7?z.slice(0,3)+'-'+z.slice(3):z}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function render(){
  const q=document.getElementById('q').value.toLowerCase();
  const db=document.getElementById('db').value;
  let arr=DATA.filter(r=>(!db||r.db===db)&&(!q||((r.name+r.addr+r.phone+r.zip+r.db).toLowerCase().includes(q))));
  document.getElementById('count').textContent=`${arr.length}件 / 全${DATA.length}件`;
  document.getElementById('tb').innerHTML=arr.slice(0,5000).map(r=>`<tr><td>${esc(r.name)}</td><td class="db">${esc(r.db)}</td><td class="zip">${esc(fzip(r.zip))}</td><td>${esc(r.addr)}</td><td>${esc(r.phone)}</td></tr>`).join('');
}
q.addEventListener('input',render); db.addEventListener('change',render);
</script></body></html>
